<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>✓</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow | Offline-First Task Manager</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.backgroundColor = '#ff3333';
        div.style.color = '#ffffff';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 5px 15px rgba(0,0,0,0.5)';
        div.innerText = 'Runtime Error: ' + e.message + '\nAt: ' + e.filename + ':' + e.lineno + '\n\nStack:\n' + (e.error ? e.error.stack : 'N/A');
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.backgroundColor = '#ff8800';
        div.style.color = '#ffffff';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 5px 15px rgba(0,0,0,0.5)';
        div.innerText = 'Unhandled Promise Rejection: ' + e.reason + '\n\nReason Stack:\n' + (e.reason && e.reason.stack ? e.reason.stack : 'N/A');
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
